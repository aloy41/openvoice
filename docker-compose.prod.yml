# Openvoice PRODUCTION stack. Hardened relative to docker-compose.dev.yml:
#   - built images (no source bind mounts, no live reload)
#   - production environment (dev shared-password login refused at startup)
#   - database/redis NOT published to the host (private network only)
#   - non-root, no-new-privileges, restart policies, resource limits
#   - automatic TLS via Caddy + Let's Encrypt on a real domain
#   - scheduled pg_dump backups with retention
#
# See docs/operations/production-deployment.md. Requires .env.prod (see
# .env.prod.example). Bring up with:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
name: openvoice

x-restart: &restart
  restart: unless-stopped
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    <<: [*restart, *hardening]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openvoice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: openvoice
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvoice -d openvoice"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 1g
    # No published ports: only the api and backup services reach it, over the
    # private compose network.

  redis:
    <<: [*restart, *hardening]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 512m

  livekit:
    <<: [*restart, *hardening]
    image: livekit/livekit-server:v1.9.11
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:?set in .env.prod}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?set in .env.prod}: ${LIVEKIT_API_SECRET:?set in .env.prod}"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7881:7881"                     # WebRTC over TCP fallback
      - "3478:3478/udp"                 # TURN/UDP
      - "50000-50100:50000-50100/udp"   # WebRTC media
    mem_limit: 1g

  api:
    <<: [*restart, *hardening]
    build:
      context: apps/api
      dockerfile: Dockerfile.prod
    image: openvoice-api:prod
    environment:
      OPENVOICE_ENVIRONMENT: production
      OPENVOICE_SECRET_KEY: ${OPENVOICE_SECRET_KEY:?set in .env.prod}
      OPENVOICE_DATABASE_URL: postgresql+asyncpg://openvoice:${POSTGRES_PASSWORD}@postgres:5432/openvoice
      OPENVOICE_REDIS_URL: redis://redis:6379/0
      OPENVOICE_DEV_AUTH_ENABLED: "false"
      OPENVOICE_LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      OPENVOICE_LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENVOICE_LIVEKIT_WS_URL: origin
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g

  caddy:
    <<: [*restart, *hardening]
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile.prod
    image: openvoice-web:prod
    environment:
      OPENVOICE_DOMAIN: ${OPENVOICE_DOMAIN:?set in .env.prod}
      OPENVOICE_ACME_EMAIL: ${OPENVOICE_ACME_EMAIL:?set in .env.prod}
    ports:
      - "80:80"     # ACME HTTP challenge + redirect to HTTPS
      - "443:443"   # HTTPS
    volumes:
      - caddy-data:/data      # issued certificates (persist across restarts)
      - caddy-config:/config
    depends_on:
      - api
      - livekit
    mem_limit: 256m

  # Scheduled logical backups: pg_dump every BACKUP_INTERVAL_SECONDS into the
  # backups volume, pruning dumps older than BACKUP_KEEP_DAYS. Restore with
  # infra/scripts/restore.sh (see production-deployment.md).
  db-backup:
    <<: *restart
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - backups:/backups
      - ./infra/scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["sh", "/usr/local/bin/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  backups:
