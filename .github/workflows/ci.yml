name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Fake credentials for CI only — conspicuously not secrets.
  CI_SECRET_KEY: ci-only-secret-key-0123456789abcdef0123456789abcdef
  CI_DEV_PASSWORD: ci-only-dev-password
  CI_LIVEKIT_SECRET: ci-only-livekit-secret-0123456789abcdef

jobs:
  api:
    name: API — lint, types, tests (PostgreSQL + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openvoice
          POSTGRES_PASSWORD: ci-postgres
          POSTGRES_DB: openvoice_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openvoice" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        working-directory: apps/api
        run: |
          python -m pip install --upgrade "pip>=26.1"
          PIP_CONSTRAINT=constraints.txt pip install -e ".[dev]" pip-audit
      - name: Ruff lint
        working-directory: apps/api
        run: ruff check .
      - name: Ruff format
        working-directory: apps/api
        run: ruff format --check .
      - name: Mypy (strict)
        working-directory: apps/api
        run: mypy
      - name: Pytest
        working-directory: apps/api
        env:
          OPENVOICE_TEST_DATABASE_URL: postgresql+asyncpg://openvoice:ci-postgres@localhost:5432/openvoice_test
          OPENVOICE_REDIS_URL: redis://localhost:6379/0
        run: pytest -v
      - name: Dependency audit (pip-audit)
        working-directory: apps/api
        run: pip-audit --skip-editable

  contract:
    name: OpenAPI contract & generated client drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install API
        working-directory: apps/api
        run: PIP_CONSTRAINT=constraints.txt pip install -e .
      - name: Export schema
        working-directory: apps/api
        run: python -m openvoice_api.export_openapi > openapi.json
      - name: Install JS workspaces
        run: npm ci
      - name: Regenerate TS client
        run: npm run generate -w packages/api-client
      - name: Fail on drift
        run: git diff --exit-code -- apps/api/openapi.json packages/api-client/src/schema.d.ts

  web:
    name: Web — lint, types, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint -w apps/web
      - run: npm run typecheck -w apps/web
      - run: npm run test -w apps/web
      - run: npm run build -w apps/web
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

  prod-images:
    name: Production images — build + smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openvoice
          POSTGRES_PASSWORD: ci-postgres
          POSTGRES_DB: openvoice
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openvoice" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v5

      # Build the ACTUAL production images (not the dev Dockerfile).
      - name: Build production API image
        run: docker build -f apps/api/Dockerfile.prod -t openvoice-api:prod apps/api
      - name: Build production web/Caddy image
        run: docker build -f infra/caddy/Dockerfile.prod -t openvoice-web:prod .

      # Validate the production compose file and the production Caddyfile.
      - name: Validate production compose config
        env:
          OPENVOICE_DOMAIN: chat.example.com
          OPENVOICE_ACME_EMAIL: admin@example.com
          OPENVOICE_SECRET_KEY: ci-only-secret-key-0123456789abcdef0123456789abcdef
          POSTGRES_PASSWORD: ci-postgres
          LIVEKIT_API_KEY: devkey
          LIVEKIT_API_SECRET: ci-only-livekit-secret-0123456789abcdef
          LIVEKIT_NODE_IP: 203.0.113.10
        run: docker compose -f docker-compose.prod.yml config >/dev/null
      - name: Validate production Caddyfile
        run: |
          docker run --rm -e OPENVOICE_DOMAIN=chat.example.com \
            -e OPENVOICE_ACME_EMAIL=admin@example.com \
            openvoice-web:prod caddy validate --config /etc/caddy/Caddyfile

      # Smoke-test the production API image: it must migrate and serve against
      # a real Postgres + Redis. (The full prod stack's Caddy needs a public
      # domain for ACME, so we exercise the API image directly here.)
      - name: Smoke test production API image
        run: |
          docker run -d --name ov-api-prod --network host \
            -e OPENVOICE_ENVIRONMENT=production \
            -e OPENVOICE_DEV_AUTH_ENABLED=false \
            -e OPENVOICE_SECRET_KEY=ci-only-secret-key-0123456789abcdef0123456789abcdef \
            -e OPENVOICE_DATABASE_URL=postgresql+asyncpg://openvoice:ci-postgres@localhost:5432/openvoice \
            -e OPENVOICE_REDIS_URL=redis://localhost:6379/0 \
            -e OPENVOICE_LIVEKIT_API_KEY=devkey \
            -e OPENVOICE_LIVEKIT_API_SECRET=ci-only-livekit-secret-0123456789abcdef \
            -e OPENVOICE_LIVEKIT_WS_URL=origin \
            openvoice-api:prod
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/healthz >/dev/null 2>&1; then
              echo "prod API image healthy"; exit 0
            fi
            sleep 2
          done
          echo "prod API image did not become healthy"; docker logs ov-api-prod; exit 1
      - name: Prod API logs on failure
        if: failure()
        run: docker logs ov-api-prod || true

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Use the open-source gitleaks CLI directly. The gitleaks-action wrapper
      # now requires a paid license key for org/user accounts; the underlying
      # binary (Apache-2.0) does not, and scans the full git history the same
      # way. Non-zero exit on any finding fails the job.
      - name: Scan git history for secrets
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 \
            git /repo --no-banner --redact --verbose

  e2e:
    name: E2E — full-stack flows (chat, reactions, presence, …)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      # Install host deps BEFORE starting the stack: the web container runs as
      # root and writes apps/web/node_modules/.vite into the bind mount, which
      # a later `npm ci` (as the runner user) cannot remove (EACCES).
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Create .env for the stack
        run: |
          cat > .env <<EOF
          OPENVOICE_ENVIRONMENT=development
          OPENVOICE_SECRET_KEY=${CI_SECRET_KEY}
          OPENVOICE_DEV_AUTH_ENABLED=true
          OPENVOICE_DEV_AUTH_PASSWORD=${CI_DEV_PASSWORD}
          POSTGRES_PASSWORD=ci-postgres
          LIVEKIT_API_KEY=devkey
          LIVEKIT_API_SECRET=${CI_LIVEKIT_SECRET}
          OPENVOICE_LIVEKIT_WS_URL=ws://localhost:7880
          EOF
      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d --build
      - name: Wait for readiness
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/readyz > /dev/null 2>&1; then exit 0; fi
            sleep 3
          done
          echo "stack did not become ready"; docker compose -f docker-compose.dev.yml logs; exit 1
      # Real-media voice tests (LiveKit join + audio decode) are skipped here —
      # shared runners have no reliable WebRTC media path. They run locally and
      # on self-hosted runners (set RUN_VOICE_E2E=1). See tests/e2e/helpers.ts.
      - name: Run end-to-end flows
        env:
          OPENVOICE_DEV_AUTH_PASSWORD: ${{ env.CI_DEV_PASSWORD }}
        run: npm run test:e2e
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
