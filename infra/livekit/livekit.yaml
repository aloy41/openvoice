# LiveKit development configuration.
# API keys are provided via the LIVEKIT_KEYS environment variable in compose —
# never store secrets in this file.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # Development on localhost only; a real deployment must advertise its
  # external IP (see LiveKit self-hosting docs) and add TURN.
  use_external_ip: false
room:
  auto_create: true
  empty_timeout: 300
logging:
  level: info
  json: true
